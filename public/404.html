<!doctype html>
<html lang="en-AU">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Page not found — Riverstone Logistics</title>
<style>
  :root {
    --brand: #1F3A5F;
    --muted: #6B7480;
    --bg: #F5F6F8;
    --text: #1A1F2B;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  header {
    background: var(--brand);
    color: #fff;
    padding: 14px 24px;
  }
  header h1 {
    margin: 0;
    font-size: 18px;
    font-weight: 600;
  }
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
  }
  .code { font-size: 72px; font-weight: 700; color: var(--brand); opacity: 0.15; line-height: 1; }
  h2 { margin: 8px 0 12px; font-size: 22px; }
  p { color: var(--muted); margin: 0 0 24px; max-width: 380px; }
  a {
    display: inline-block;
    background: var(--brand);
    color: #fff;
    text-decoration: none;
    padding: 10px 22px;
    border-radius: 6px;
    font-weight: 600;
    font-size: 14px;
  }
  a:hover { opacity: 0.9; }
</style>
</head>
<body>
<header>
  <h1>Riverstone Logistics — Operations Dashboard</h1>
</header>
<main>
  <div class="code">404</div>
  <h2>Page not found</h2>

  <a href="/">Go to Dashboard</a>

</body>
</html>
